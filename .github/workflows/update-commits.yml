name: Atualizar commits por repositório

on:
  schedule:
    - cron: "0 12 * * *"  # roda todo dia às 12h (UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Instalar dependências
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Gerar métrica de commits por repositório com linguagens
        env:
          GH_TOKEN: ${{ secrets.PROFILEWORKFLOW }}
          USERNAME: bkarln
        run: |
          echo '<!--COMMIT_SECTION_START-->' > commits.md
          echo '<div align="center">' >> commits.md
          echo '<table>' >> commits.md

          repos=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/users/$USERNAME/repos?per_page=100" | jq -r '.[].name')

          row_count=0
          for repo in $repos; do
            # Contagem de commits mais robusta
            count=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$USERNAME/$repo/commits?per_page=100" | jq 'length')

            langs=$(curl -s -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/$USERNAME/$repo/languages" | jq -r 'keys | join(", ")')

            color="blue"
            repo_url="https://github.com/$USERNAME/$repo"

            if [[ $((row_count % 3)) == 0 ]]; then
              echo '<tr>' >> commits.md
            fi

            echo "<td align=\"center\">" >> commits.md
            echo "<a href=\"$repo_url\" target=\"_blank\">$repo</a><br/>" >> commits.md
            echo "<img src=\"https://img.shields.io/badge/Commits-${count:-0}-$color?style=for-the-badge\"/><br/>" >> commits.md
            echo "<sub>🧠 ${langs:-Sem linguagem}</sub>" >> commits.md
            echo "</td>" >> commits.md

            row_count=$((row_count + 1))
            if [[ $((row_count % 3)) == 0 ]]; then
              echo '</tr>' >> commits.md
            fi
          done

          if [[ $((row_count % 3)) != 0 ]]; then
            echo '</tr>' >> commits.md
          fi

          echo '</table>' >> commits.md
          echo '</div>' >> commits.md
          echo '<!--COMMIT_SECTION_END-->' >> commits.md

      - name: Atualizar README.md
        run: |
          start='<!--COMMIT_SECTION_START-->'
          end='<!--COMMIT_SECTION_END-->'

          sed -i "/$start/,/$end/{ /$start/{p; r commits.md
          }; /$end/p; d }" README.md

      - name: Commit e push
        run: |
          git config --local user.email "karolaine.b@gmail.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "Atualiza métrica de commits por repositório" || echo "Nenhuma alteração para commitar"
          git push
